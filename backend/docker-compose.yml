version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest # Multi-arch (AMD64/ARM64)
    container_name: portfolio-pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb_data
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Internal command to ensure it listens to the Docker network
    command: ["serve", "--http=0.0.0.0:8090"]

volumes:
  pocketbase_data: